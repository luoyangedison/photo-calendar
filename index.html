<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>共享日历 · 儿童摄影</title>
<style>
:root{--bg:#f5f2ef;--card:#fff;--text:#3d3533;--text2:#8a7e7a;--border:#e8e3df;--primary:#e8734a;--primary-light:#fef0ea;--shooting:#e8734a;--shooting-bg:#fef0ea;--selection:#3b8ecc;--selection-bg:#edf5fb;--daily:#4a9e6e;--daily-bg:#edf7f1;--holiday-bg:#fff3e0;--today-bg:#fff8f0;--shadow:0 1px 3px rgba(0,0,0,.06);--radius:10px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.setup-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.setup-card{background:var(--card);border-radius:16px;padding:28px 22px;width:100%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.setup-card h2{font-size:18px;margin-bottom:6px}.setup-card h2 span{color:var(--primary)}
.steps{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.8}
.steps ol{padding-left:18px;margin:6px 0}
.steps li{margin-bottom:4px}
.steps b{color:var(--text)}
.steps a{color:var(--primary);word-break:break-all}
.setup-card label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px;margin-top:10px}
.setup-card input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#faf9f8;outline:none;font-family:var(--font)}
.setup-card input:focus{border-color:var(--primary);background:#fff}
.inline-hint{font-size:11px;color:var(--text2)}
.setup-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px}
.setup-btn:active{background:#d4653d}
.setup-err{font-size:13px;color:#c0392b;margin-top:6px;min-height:20px}
.auth-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{background:var(--card);border-radius:16px;padding:28px 22px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center}
.auth-card h1{font-size:22px;margin-bottom:4px}.auth-card h1 span{color:var(--primary)}
.auth-card .sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.tab-row{display:flex;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;font-size:14px;font-weight:600;border:none;background:#faf9f8;cursor:pointer;color:var(--text2)}
.tab-btn.active{background:var(--primary);color:#fff}
.auth-card input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px;font-family:var(--font);background:#faf9f8;outline:none}
.auth-card input:focus{border-color:var(--primary);background:#fff}
.auth-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.auth-btn:active{background:#d4653d}
.err{color:#c0392b;font-size:13px;margin-top:8px;min-height:20px}
.app{display:none;flex-direction:column;min-height:100vh}
.app.active{display:flex}
.header{background:var(--card);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700}.header h1 span{color:var(--primary)}
.user-row{display:flex;align-items:center;gap:8px}
.user-tag{font-size:12px;background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:10px;font-weight:600}
.logout-btn{font-size:12px;color:var(--text2);border:none;background:none;cursor:pointer}
.btn{padding:7px 13px;border-radius:18px;font-size:12px;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;white-space:nowrap}
.btn:active{background:#f5f2ef}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:active{background:#d4653d}
.month-nav{display:flex;align-items:center;justify-content:center;padding:12px 14px 6px;gap:12px;flex-wrap:wrap}
.month-label{font-size:17px;font-weight:700;min-width:120px;text-align:center}
.nav-arrow{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.legend{display:flex;gap:14px;justify-content:center;padding:6px 10px 8px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%}
.ld-shooting{background:var(--shooting)}.ld-selection{background:var(--selection)}.ld-daily{background:var(--daily)}
.cal-wrapper{max-width:700px;margin:0 auto;padding:0 6px 10px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0}
.weekdays .we{color:var(--shooting)}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-cell{min-height:56px;border-radius:6px;cursor:pointer;padding:3px 3px 2px;font-size:12px;transition:background .12s;border:1px solid transparent;overflow:hidden;display:flex;flex-direction:column}
.day-cell:hover{background:rgba(0,0,0,.02)}
.day-cell.other-month{color:#ccc;cursor:default}.day-cell.other-month:hover{background:transparent}
.day-cell.today{border-color:var(--primary);background:var(--today-bg)}.day-cell.today .day-num{color:var(--primary);font-weight:800}
.day-cell.selected{border-color:var(--primary);background:var(--primary-light)}
.day-cell.holiday{background:var(--holiday-bg)}
.day-num{font-size:13px;font-weight:600;line-height:1;margin-bottom:1px;display:flex;align-items:center;gap:3px}
.holiday-tag{font-size:9px;background:#ff9800;color:#fff;padding:0 3px;border-radius:3px}
.day-events{display:flex;flex-direction:column;gap:1px;flex:1;overflow:hidden}
.day-event{font-size:9px;line-height:1.3;padding:1px 3px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px}
.de-shooting{background:var(--shooting-bg);color:var(--shooting)}.de-selection{background:var(--selection-bg);color:var(--selection)}.de-daily{background:var(--daily-bg);color:var(--daily)}
.period-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.pd-morning{background:var(--shooting)}.pd-afternoon{background:var(--selection)}.pd-fullday{background:var(--daily)}
.more-events{font-size:9px;color:var(--text2);padding:0 3px}
.detail-panel{max-width:700px;margin:0 auto;padding:0 8px 20px;display:none}
.detail-panel.active{display:block}
.detail-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 0 4px}
.detail-date{font-size:15px;font-weight:700}
.detail-close{width:26px;height:26px;border-radius:50%;border:none;background:#f0ece8;font-size:13px;cursor:pointer;color:var(--text2)}
.event-list{display:flex;flex-direction:column;gap:6px}
.event-card{background:var(--card);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow);border-left:3px solid transparent}
.ec-shooting{border-left-color:var(--shooting)}.ec-selection{border-left-color:var(--selection)}.ec-daily{border-left-color:var(--daily)}
.ec-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.ec-pill{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.pill-shooting{background:var(--shooting-bg);color:var(--shooting)}.pill-selection{background:var(--selection-bg);color:var(--selection)}.pill-daily{background:var(--daily-bg);color:var(--daily)}
.pill-morning{background:#fff3e0;color:#e68a00}.pill-afternoon{background:#e8f0fe;color:#2962cc}
.ec-title{font-size:14px;font-weight:600}
.ec-info{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.ec-actions{display:flex;gap:6px;margin-top:8px}
.btn-xs{padding:3px 10px;font-size:11px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text2)}
.btn-xs.danger{color:#c0392b}
.empty-hint{text-align:center;padding:26px 0;color:var(--text2);font-size:13px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 16px 28px;box-shadow:0 -4px 20px rgba(0,0,0,.1);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h2{font-size:16px;margin-bottom:14px;text-align:center}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:var(--font);background:#faf9f8;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--primary);background:#fff}
.fg textarea{resize:vertical;min-height:50px}
.fg-row{display:flex;gap:8px}.fg-row .fg{flex:1}
.type-btns{display:flex;gap:6px}
.tbtn{flex:1;padding:8px;border-radius:7px;border:2px solid var(--border);background:#fff;text-align:center;font-size:12px;font-weight:600;cursor:pointer}
.tbtn.act-s{background:var(--shooting-bg);border-color:var(--shooting);color:var(--shooting)}
.tbtn.act-sl{background:var(--selection-bg);border-color:var(--selection);color:var(--selection)}
.tbtn.act-d{background:var(--daily-bg);border-color:var(--daily);color:var(--daily)}
.period-btns{display:flex;gap:6px}
.pbtn{flex:1;padding:7px;border-radius:7px;border:2px solid var(--border);background:#fff;text-align:center;font-size:12px;font-weight:600;cursor:pointer}
.pbtn.act-p{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.reminder-row{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.reminder-row select{padding:7px 10px;border-radius:7px;border:1px solid var(--border);font-size:13px;background:#faf9f8}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1;padding:11px;font-size:14px;border-radius:10px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.reconfig{text-align:center;padding:10px;font-size:11px;margin-top:auto}
.reconfig a{color:var(--text2)}
@media(min-width:600px){.day-cell{min-height:88px;padding:4px 4px 2px}.day-event{font-size:10px;line-height:1.4}}
</style>
</head>
<body>

<!-- 配置页 -->
<div class="setup-page" id="setupPage">
<div class="setup-card">
<h2>共享日历 · <span>绑定腾讯云</span></h2>
<div class="steps">
<p>请在 CloudBase 控制台完成以下配置：</p>
<ol>
<li><b>安全域名</b>：环境 → 安全配置 → 添加 <code>luoyangedison.github.io</code></li>
<li><b>Publishable Key</b>：环境 → API Key → 生成 Publishable Key</li>
<li><b>数据库</b>：新建 <code>users</code> 和 <code>events</code> 集合，权限选「所有用户可读写」</li>
</ol>
</div>
<label>环境 ID（格式：xxx-xxxxxxxx）</label>
<input id="tcbEnvId" placeholder="例如 sugarkids-calendar-d5cqlca3363d8">
<label>Publishable Key（在 API Key 页面生成）</label>
<input id="tcbKey" placeholder="sb_publishable_...">
<div class="inline-hint">如果没生成 Key，也可以去「登录授权」开启匿名登录，然后留空此处</div>
<button class="setup-btn" onclick="saveConfig()">绑定并开始使用</button>
<div class="setup-err" id="setupErr"></div>
</div>
</div>

<!-- 登录 -->
<div class="auth-page" id="authPage" style="display:none">
<div class="auth-card">
<h1>共享日历</h1>
<div class="sub">儿童摄影 · 团队协作</div>
<div class="tab-row">
<button class="tab-btn active" onclick="switchTab('login')">登录</button>
<button class="tab-btn" onclick="switchTab('register')">注册</button>
</div>
<div id="loginForm">
<input id="loginUser" placeholder="用户名" autocomplete="username">
<input id="loginPass" type="password" placeholder="密码" autocomplete="current-password">
<button class="auth-btn" onclick="doLogin()">登 录</button>
</div>
<div id="registerForm" style="display:none">
<input id="regUser" placeholder="设置用户名">
<input id="regPass" type="password" placeholder="设置密码">
<input id="regPass2" type="password" placeholder="确认密码">
<button class="auth-btn" onclick="doRegister()">注 册</button>
</div>
<div class="err" id="authErr"></div>
</div>
</div>

<!-- 主界面 -->
<div class="app" id="app">
<div class="header">
<h1>共享日历</h1>
<div class="user-row"><span class="user-tag" id="currentUserTag"></span><button class="logout-btn" onclick="logout()">退出</button></div>
</div>
<div class="month-nav">
<button class="nav-arrow" onclick="changeMonth(-1)">&#9664;</button>
<div class="month-label" id="monthLabel"></div>
<button class="nav-arrow" onclick="changeMonth(1)">&#9654;</button>
<button class="btn" onclick="goToday()">今天</button>
<button class="btn btn-primary" onclick="openAddModal()">+ 添加</button>
</div>
<div class="legend">
<span class="legend-item"><span class="legend-dot ld-shooting"></span>拍摄</span>
<span class="legend-item"><span class="legend-dot ld-selection"></span>选片</span>
<span class="legend-item"><span class="legend-dot ld-daily"></span>日常工作</span>
</div>
<div class="cal-wrapper">
<div class="weekdays"><span class="we">日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="we">六</span></div>
<div class="days-grid" id="daysGrid"></div>
</div>
<div class="detail-panel" id="detailPanel">
<div class="detail-hd"><div class="detail-date" id="detailDate"></div><button class="detail-close" onclick="closeDetail()">&#10005;</button></div>
<div class="event-list" id="eventList"></div>
</div>
<div class="reconfig"><a href="#" onclick="resetConfig()">重新绑定 CloudBase</a></div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">
<h2 id="modalTitle">添加事件</h2>
<div class="type-btns">
<button class="tbtn act-s" onclick="setType('shooting')">📸 拍摄</button>
<button class="tbtn" onclick="setType('selection')">🖼 选片</button>
<button class="tbtn" onclick="setType('daily')">📋 日常工作</button>
</div>
<div class="period-btns" style="margin-top:8px">
<button class="pbtn act-p" onclick="setPeriod('morning')">☀️ 上午</button>
<button class="pbtn" onclick="setPeriod('afternoon')">🌙 下午</button>
<button class="pbtn" onclick="setPeriod('fullday')">📅 全天</button>
</div>
<div class="fg-row"><div class="fg"><label>日期</label><input type="date" id="fDate"></div><div class="fg"><label>时间(可选)</label><input type="time" id="fTime"></div></div>
<div class="fg"><label>标题</label><input id="fTitle" placeholder="例如：乐乐3岁照"></div>
<div id="customerFields"><div class="fg-row"><div class="fg"><label>客户姓名</label><input id="fCustomer" placeholder="客户姓名"></div><div class="fg"><label>客户电话</label><input id="fPhone" placeholder="手机号"></div></div></div>
<div class="fg"><label>负责人 @</label><select id="fAssignee"><option value="">不指定</option></select></div>
<div class="reminder-row"><label style="font-size:12px;font-weight:600;color:var(--text2)">提醒</label>
<select id="fReminder"><option value="0">不提醒</option><option value="10">提前10分钟</option><option value="30">提前30分钟</option><option value="60">提前1小时</option><option value="120">提前2小时</option><option value="1440">提前1天</option><option value="4320">提前3天</option></select></div>
<div class="fg"><label>备注</label><textarea id="fDesc" placeholder="补充说明..."></textarea></div>
<div class="modal-actions"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" id="modalSubmit" onclick="submitEvent()">保存</button></div>
</div></div>
<div class="modal-overlay" id="selModalOverlay"><div class="modal-sheet">
<h2 id="selModalTitle">选择选片日期</h2>
<div class="fg"><label>选片日期</label><input type="date" id="selDate"></div>
<div class="fg" style="margin-top:8px"><label>选片时间(可选)</label><input type="time" id="selTime"></div>
<div class="modal-actions" style="margin-top:18px">
<button class="btn" onclick="closeSelModal()">取消</button>
<button class="btn btn-primary" onclick="submitSelection()">确认</button>
</div>
</div></div>
<div class="toast" id="toast"></div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js">
// ====== 选片功能 ======
let selTargetEventId = null;
window.openSelectionModal = function(eventId) {
  selTargetEventId = eventId;
  const ev = allEvents.find(e => e._id === eventId);
  document.getElementById('selModalTitle').textContent = '选择选片日期 - ' + (ev ? ev.title : '');
  document.getElementById('selDate').value = todayStr;
  document.getElementById('selModalOverlay').classList.add('active');
};
window.closeSelModal = function() { document.getElementById('selModalOverlay').classList.remove('active'); selTargetEventId = null; };
window.submitSelection = async function() {
  const selDateVal = document.getElementById('selDate').value;
  const selTimeVal = document.getElementById('selTime').value;
  if (!selDateVal) { toast('请选择选片日期'); return; }
  const ev = allEvents.find(e => e._id === selTargetEventId);
  if (!ev) { toast('事件不存在'); return; }
  try {
    const selTitle = '选片 - ' + ev.title;
    const selData = {
      type: 'selection', date: selDateVal, time: selTimeVal, title: selTitle,
      customer_name: ev.customer_name || '', customer_phone: ev.customer_phone || '',
      assignee: ev.assignee || '', period: ev.period || 'fullday', description: '',
      reminder_enabled: false, reminder_minutes: 0,
      selection_for: selTargetEventId,
      created_by: currentUser,
      created_at: new Date().toISOString().slice(0, 16).replace('T', ' ')
    };
    const existingSel = allEvents.find(e => e.type === 'selection' && (e.selection_for === selTargetEventId || e.title === selTitle));
    if (existingSel) {
      selData.replaces = existingSel._id;
    }
    await db.collection('events').add(selData);
    closeSelModal();
    await fetchEvents();
    toast('选片已安排');
  } catch(e) { toast('操作失败：' + e.message); }
};
document.getElementById('selModalOverlay').addEventListener('click', function(e) { if (e.target === this) closeSelModal(); });

// 删除确认（仅创建者可触发）
window.deleteEventConfirm = async function(id) {
  if (!confirm('确认删除该事件？')) return;
  try {
    const oldDoc = await db.collection('events').doc(id).get();
    if (!oldDoc.data || oldDoc.data.length === 0) { toast('事件不存在，可能已被删除'); return; }
    const old = oldDoc.data[0];
    await db.collection('events').add({
      type: '_tombstone',
      date: old.date,
      deletes: id,
      created_by: currentUser,
      created_at: new Date().toISOString().slice(0, 16).replace('T', ' ')
    });
    allEvents = allEvents.filter(ev => ev._id !== id);
    render(); if (selDate) showDetail(selDate);
  } catch(e) { toast('删除失败：' + e.message); }
};

</script>

<script>
// ====== 状态 ======
let app = null, db = null;
let curY, curM, selDate = null, editingId = null, curType = 'shooting', curPeriod = 'morning';
let allEvents = [], allUsers = [], currentUser = null;

const HOLIDAYS = {"2026-01-01":"元旦","2026-01-02":"元旦","2026-01-03":"元旦","2026-02-15":"春节","2026-02-16":"除夕","2026-02-17":"春节","2026-02-18":"春节","2026-02-19":"春节","2026-02-20":"春节","2026-02-21":"春节","2026-04-04":"清明节","2026-04-05":"清明节","2026-04-06":"清明节","2026-05-01":"劳动节","2026-05-02":"劳动节","2026-05-03":"劳动节","2026-05-04":"劳动节","2026-05-05":"劳动节","2026-05-30":"端午节","2026-05-31":"端午节","2026-06-01":"端午节","2026-09-25":"中秋节","2026-10-01":"国庆节","2026-10-02":"国庆节","2026-10-03":"国庆节","2026-10-04":"国庆节","2026-10-05":"国庆节","2026-10-06":"国庆节","2026-10-07":"国庆节","2026-10-08":"国庆节"};
const today = new Date();
const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

// ====== 初始化 CloudBase ======
async function initTCB(envId, accessKey) {
  if (!window.cloudbase) throw new Error('CloudBase SDK 加载失败，请刷新页面重试');
  const cfg = { env: envId };
  if (accessKey) cfg.accessKey = accessKey;
  app = cloudbase.init(cfg);
  // 尝试匿名登录（如果没给 Publishable Key）
  if (!accessKey) {
    try { await app.auth.signInAnonymously(); } catch(e) {
      throw new Error('登录失败。请在 CloudBase 控制台生成 Publishable Key（环境→API Key），或开启匿名登录（环境→登录授权）');
    }
  }
  db = app.database();
}

// ====== 内置配置 ======
const BUILTIN_ENV = 'sugarkids-calendar-d5cqlca3363d8';

// ====== 配置检测 ======
function checkConfig() {
  const envId = localStorage.getItem('tcb_env') || BUILTIN_ENV;
  document.getElementById('setupPage').style.display = 'none';
  return envId;
}

window.saveConfig = async function() {
  const envId = document.getElementById('tcbEnvId').value.trim();
  const accessKey = document.getElementById('tcbKey').value.trim();
  const errEl = document.getElementById('setupErr');
  errEl.textContent = '';
  if (!envId) { errEl.textContent = '请输入环境 ID'; return; }

  try {
    errEl.textContent = '正在连接 CloudBase...';
    await initTCB(envId, accessKey);
    localStorage.setItem('tcb_env', envId);
    if (accessKey) localStorage.setItem('tcb_key', accessKey);
    else localStorage.removeItem('tcb_key');
    document.getElementById('setupPage').style.display = 'none';
    document.getElementById('authPage').style.display = 'flex';
    init();
  } catch(e) {
    errEl.textContent = '连接失败：' + e.message;
  }
};

window.resetConfig = function() {
  localStorage.removeItem('tcb_env'); localStorage.removeItem('tcb_key'); localStorage.removeItem('cal_user');
  document.getElementById('app').classList.remove('active');
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('setupPage').style.display = 'flex';
  document.getElementById('tcbEnvId').value = BUILTIN_ENV;
  document.getElementById('tcbKey').value = '';
  document.getElementById('setupErr').textContent = '';
};

// ====== 启动 ======
(async function() {
  const envId = checkConfig();
  if (!envId) return;
  try {
    const key = localStorage.getItem('tcb_key') || '';
    await initTCB(envId, key);
    init();
  } catch(e) {
    document.getElementById('setupPage').style.display = 'flex';
    document.getElementById('tcbEnvId').value = envId;
    document.getElementById('setupErr').textContent = '连接失败：' + e.message;
  }
})();

function init() {
  const u = localStorage.getItem('cal_user');
  if (u) { currentUser = u; enterApp(); }
  else { document.getElementById('authPage').style.display = 'flex'; }
}

// ====== 登录/注册 ======
window.switchTab = function(t) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (t === 'login' && i === 0) || (t === 'register' && i === 1)));
  document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = t === 'register' ? 'block' : 'none';
  document.getElementById('authErr').textContent = '';
};

window.doLogin = async function() {
  const u = document.getElementById('loginUser').value.trim(), p = document.getElementById('loginPass').value.trim();
  if (!u || !p) { document.getElementById('authErr').textContent = '请填写用户名和密码'; return; }
  try {
    const hash = await sha256(p);
    const res = await db.collection('users').where({ username: u, password_hash: hash }).get();
    if (!res.data || res.data.length === 0) { document.getElementById('authErr').textContent = '用户名或密码错误'; return; }
    currentUser = u; localStorage.setItem('cal_user', u); enterApp();
  } catch(e) { document.getElementById('authErr').textContent = '登录失败：' + e.message; }
};

window.doRegister = async function() {
  const u = document.getElementById('regUser').value.trim(), p = document.getElementById('regPass').value.trim(), p2 = document.getElementById('regPass2').value.trim();
  if (!u || !p) { document.getElementById('authErr').textContent = '请填写用户名和密码'; return; }
  if (p !== p2) { document.getElementById('authErr').textContent = '两次密码不一致'; return; }
  if (p.length < 3) { document.getElementById('authErr').textContent = '密码至少3位'; return; }
  try {
    const exist = await db.collection('users').where({ username: u }).get();
    if (exist.data && exist.data.length > 0) { document.getElementById('authErr').textContent = '用户名已存在'; return; }
    await db.collection('users').add({ username: u, password_hash: await sha256(p), created_at: new Date().toISOString() });
    currentUser = u; localStorage.setItem('cal_user', u); enterApp();
  } catch(e) { document.getElementById('authErr').textContent = '注册失败：' + e.message; }
};

async function sha256(m) { const e = new TextEncoder(); const d = await crypto.subtle.digest('SHA-256', e.encode(m)); return Array.from(new Uint8Array(d)).map(b => b.toString(16).padStart(2, '0')).join(''); }
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('regPass2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });

window.logout = function() { currentUser = null; localStorage.removeItem('cal_user'); document.getElementById('app').classList.remove('active'); document.getElementById('authPage').style.display = 'flex'; };

// ====== 进入主界面 ======
async function enterApp() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('currentUserTag').textContent = currentUser;
  curY = today.getFullYear(); curM = today.getMonth();
  await loadUsers(); await fetchEvents(); startReminderChecker();
}

async function loadUsers() {
  try {
    const res = await db.collection('users').field({ username: true }).get();
    allUsers = (res.data || []).map(u => u.username);
    const sel = document.getElementById('fAssignee');
    sel.innerHTML = '<option value="">不指定</option>' + allUsers.map(u => `<option value="${u}">${u}</option>`).join('');
  } catch(e) { console.error('加载用户列表失败', e); }
}

async function fetchEvents() {
  const ms = `${curY}-${String(curM + 1).padStart(2, '0')}`;
  try {
    const res = await db.collection('events')
      .where({ date: db.RegExp({ regexp: `^${ms}-\\d+$`, options: 'i' }) }).get();
    allEvents = res.data || [];
  } catch(e) { allEvents = []; toast('加载数据失败：' + e.message); }
  render(); if (selDate) showDetail(selDate);
}

// ====== 渲染 ======
function render() {
  document.getElementById('monthLabel').textContent = `${curY}年 ${curM + 1}月`;
  const fd = new Date(curY, curM, 1), startDow = fd.getDay(), dim = new Date(curY, curM + 1, 0).getDate();
  const dimPrev = new Date(curY, curM, 0).getDate();
  let html = '';
  for (let i = startDow - 1; i >= 0; i--) html += `<div class="day-cell other-month">${dimPrev - i}</div>`;
  for (let d = 1; d <= dim; d++) {
    const ds = `${curY}-${String(curM + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const dayEvents = allEvents.filter(e => e.date === ds);
    const isToday = ds === todayStr, isSel = ds === selDate;
    let cls = 'day-cell'; if (isToday) cls += ' today'; if (isSel) cls += ' selected'; if (HOLIDAYS[ds]) cls += ' holiday';
    const dc = { shooting: 'de-shooting', selection: 'de-selection', daily: 'de-daily' };
    const pc = { morning: 'pd-morning', afternoon: 'pd-afternoon', fullday: 'pd-fullday' };
    function rg(evs) {
      let h = ''; const s = evs.slice(0, 2);
      s.forEach(e => { let l = e.customer_name || e.title; if (l.length > 5) l = l.slice(0, 4) + '…'; if (e.assignee) l += ' @' + e.assignee.slice(0, 3); h += `<div class="day-event ${dc[e.type] || ''}"><span class="period-dot ${pc[e.period] || ''}"></span>${escHtml(l)}</div>`; });
      if (evs.length > 2) h += `<div class="more-events">+${evs.length - 2}条</div>`;
      return h;
    }
    const ev = rg(dayEvents.filter(e => e.period === 'morning')) + rg(dayEvents.filter(e => e.period === 'afternoon')) + rg(dayEvents.filter(e => e.period === 'fullday'));
    const ht = HOLIDAYS[ds] ? '<span class="holiday-tag">休</span>' : '';
    html += `<div class="${cls}" data-date="${ds}" onclick="onDateClick('${ds}')"><div class="day-num">${d}${ht}</div><div class="day-events">${ev}</div></div>`;
  }
  const total = startDow + dim, rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= rem; i++) html += `<div class="day-cell other-month">${i}</div>`;
  document.getElementById('daysGrid').innerHTML = html;
}
function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

window.onDateClick = function(ds) { selDate = ds; render(); showDetail(ds); };
window.closeDetail = function() { selDate = null; document.getElementById('detailPanel').classList.remove('active'); render(); };

function showDetail(ds) {
  const p = document.getElementById('detailPanel'), l = document.getElementById('eventList');
  document.getElementById('detailDate').textContent = ds + (HOLIDAYS[ds] ? ' 🏖' + HOLIDAYS[ds] : '');
  const de = allEvents.filter(e => e.date === ds);
  de.sort((a, b) => { const o = { morning: 0, afternoon: 1, fullday: 2 }; return (o[a.period] ?? 0) - (o[b.period] ?? 0); });
  if (!de.length) {
    l.innerHTML = `<div class="empty-hint">暂无安排<br><button class="btn btn-primary" style="margin-top:8px" onclick="openAddModal()">+ 添加事件</button></div>`;
  } else {
    const tl = { shooting: '拍摄', selection: '选片', daily: '日常工作' }, pl = { morning: '上午', afternoon: '下午', fullday: '全天' };
    l.innerHTML = de.map(e => {
      let info = ''; if (e.customer_name) info += '客户：' + escHtml(e.customer_name); if (e.customer_phone) info += ' · ' + escHtml(e.customer_phone); if (e.assignee) info += (info ? ' · ' : '') + '负责人：' + escHtml(e.assignee); if (e.description) info += (info ? '<br>' : '') + escHtml(e.description);
      if (e.reminder_enabled) { const rm = { 10: '提前10分钟', 30: '提前30分钟', 60: '提前1小时', 120: '提前2小时', 1440: '提前1天', 4320: '提前3天' }; info += (info ? '<br>' : '') + '⏰ ' + (rm[e.reminder_minutes] || '已设置'); }
      return `<div class="event-card ec-${e.type}"><div class="ec-top"><span class="ec-pill pill-${e.period}">${pl[e.period]}</span><span class="ec-pill pill-${e.type}">${tl[e.type]}</span><span class="ec-title">${escHtml(e.title)}</span></div><div class="ec-info">${info || '—'}</div><div class="ec-info" style="font-size:10px;color:#c0b8b4;margin-top:2px">${escHtml(e.created_by)} · ${e.created_at || ''}</div><div class="ec-actions"><button class="btn-xs" onclick="editEvent('${e._id}')">编辑</button><button class="btn-xs danger" onclick="deleteEvent('${e._id}')">删除</button></div></div>`;
    }).join('');
  }
  p.classList.add('active');
}

// ====== 添加/编辑 ======
window.openAddModal = function() {
  editingId = null; curType = 'shooting'; curPeriod = 'morning';
  document.getElementById('modalTitle').textContent = '添加事件';
  document.getElementById('fDate').value = selDate || todayStr; document.getElementById('fTime').value = '';
  document.getElementById('fTitle').value = ''; document.getElementById('fCustomer').value = ''; document.getElementById('fPhone').value = '';
  document.getElementById('fDesc').value = ''; document.getElementById('fReminder').value = '0'; document.getElementById('fAssignee').value = '';
  document.getElementById('modalSubmit').textContent = '保存';
  updateTypeUI(); updatePeriodUI(); toggleCustomerFields();
  document.getElementById('modalOverlay').classList.add('active');
};
window.editEvent = function(id) {
  const e = allEvents.find(ev => ev._id === id); if (!e) return;
  editingId = id; curType = e.type; curPeriod = e.period;
  document.getElementById('modalTitle').textContent = '编辑事件';
  document.getElementById('fDate').value = e.date; document.getElementById('fTime').value = e.time || '';
  document.getElementById('fTitle').value = e.title; document.getElementById('fCustomer').value = e.customer_name || '';
  document.getElementById('fPhone').value = e.customer_phone || ''; document.getElementById('fAssignee').value = e.assignee || '';
  document.getElementById('fDesc').value = e.description || '';
  document.getElementById('fReminder').value = e.reminder_enabled ? String(e.reminder_minutes) : '0';
  document.getElementById('modalSubmit').textContent = '更新';
  updateTypeUI(); updatePeriodUI(); toggleCustomerFields();
  document.getElementById('modalOverlay').classList.add('active');
};
window.closeModal = function() { document.getElementById('modalOverlay').classList.remove('active'); editingId = null; };
window.setType = function(t) { curType = t; updateTypeUI(); toggleCustomerFields(); };
window.setPeriod = function(p) { curPeriod = p; updatePeriodUI(); };

function updateTypeUI() {
  document.querySelectorAll('.tbtn').forEach(b => { b.className = 'tbtn'; const m = { shooting: '拍摄', selection: '选片', daily: '日常' }; if (b.textContent.includes(m[curType])) b.classList.add('act-' + (curType === 'shooting' ? 's' : curType === 'selection' ? 'sl' : 'd')); });
}
function updatePeriodUI() {
  document.querySelectorAll('.pbtn').forEach(b => { b.className = 'pbtn'; if (b.textContent.includes({ morning: '上午', afternoon: '下午', fullday: '全天' }[curPeriod])) b.classList.add('act-p'); });
}
function toggleCustomerFields() { document.getElementById('customerFields').style.display = (curType === 'shooting' || curType === 'selection') ? 'block' : 'none'; }

window.submitEvent = async function() {
  const date = document.getElementById('fDate').value, time = document.getElementById('fTime').value;
  const title = document.getElementById('fTitle').value.trim();
  if (!date) { toast('请选择日期'); return; } if (!title) { toast('请输入标题'); return; }
  const rv = parseInt(document.getElementById('fReminder').value) || 0;
  const obj = { date, time, title, type: curType, period: curPeriod, customer_name: document.getElementById('fCustomer').value.trim(), customer_phone: document.getElementById('fPhone').value.trim(), assignee: document.getElementById('fAssignee').value, description: document.getElementById('fDesc').value.trim(), reminder_enabled: rv > 0, reminder_minutes: rv, reminder_notified: false, created_by: currentUser, created_at: new Date().toISOString().slice(0, 16).replace('T', ' ') };
  try {
    if (editingId) { await db.collection('events').doc(editingId).update(obj); }
    else { await db.collection('events').add(obj); }
    closeModal(); await fetchEvents();
  } catch(e) { toast('保存失败：' + e.message); }
};
window.deleteEvent = async function(id) {
  if (!confirm('确认删除？')) return;
  try { await db.collection('events').doc(id).remove(); await fetchEvents(); } catch(e) { toast('删除失败：' + e.message); }
};

// ====== 提醒 ======
const notifiedSet = new Set();
function startReminderChecker() { setInterval(checkReminders, 30000); checkReminders(); }
async function checkReminders() {
  if (!db) return; const now = new Date();
  for (const e of allEvents) {
    if (!e.reminder_enabled || e.reminder_notified || notifiedSet.has(e._id)) continue;
    const et = new Date(e.date + 'T' + (e.time || '09:00') + ':00');
    const diff = (et.getTime() - now.getTime()) / 60000;
    if (diff <= e.reminder_minutes && diff > -5) {
      notifiedSet.add(e._id);
      db.collection('events').doc(e._id).update({ reminder_notified: true }).catch(() => {});
      if (Notification.permission === 'granted') new Notification('日历提醒', { body: `${e.title} - ${e.customer_name || ''} (${e.period === 'morning' ? '上午' : e.period === 'afternoon' ? '下午' : '全天'})` });
      toast('⏰ ' + e.title);
    }
  }
}

// ====== 导航 ======
window.changeMonth = function(d) { curM += d; if (curM < 0) { curM = 11; curY--; } if (curM > 11) { curM = 0; curY++; } selDate = null; document.getElementById('detailPanel').classList.remove('active'); fetchEvents(); };
window.goToday = function() { curY = today.getFullYear(); curM = today.getMonth(); selDate = todayStr; fetchEvents(); };

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
if ('Notification' in window && Notification.permission === 'default') setTimeout(() => Notification.requestPermission(), 5000);
</script>
